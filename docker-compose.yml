version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: taskforge-backend
    restart: always
    environment:
      - PORT=5000
      - NODE_ENV=production
      - DATABASE_URL=file:/app/prisma/dev.db
      - JWT_SECRET=taskforge-super-secret-jwt-key-2026
      - CLOUDINARY_CLOUD_NAME=mock_cloud
      - CLOUDINARY_API_KEY=mock_key
      - CLOUDINARY_API_SECRET=mock_secret
    volumes:
      - backend_db:/app/prisma
      - backend_uploads:/app/uploads
    ports:
      - "5000:5000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: taskforge-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  backend_db:
  backend_uploads:
